<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送料かんたん比較</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0ea; --panel: #fffdf9; --accent: #e8572a;
  --accent2: #2a7ae8; --accent3: #27ae60;
  --text: #1a1410; --muted: #8a7d70;
  --border: #e0d5c8; --shadow: rgba(80,50,20,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px 48px; }
h1 { font-family: 'Zen Maru Gothic', sans-serif; font-size: 1.6rem; font-weight: 900; text-align: center; letter-spacing: -0.02em; margin-bottom: 4px; }
h1 span { color: var(--accent); }
.subtitle { text-align: center; font-size: 0.75rem; color: var(--muted); margin-bottom: 20px; }
.card { background: var(--panel); border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px var(--shadow); margin-bottom: 16px; border: 1px solid var(--border); }
.section-title { font-family: 'Zen Maru Gothic', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 14px; }
.input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.input-group { display: flex; flex-direction: column; gap: 5px; }
.input-group label { font-size: 0.75rem; font-weight: 500; color: var(--muted); }
.input-row { display: flex; align-items: center; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 12px; transition: border-color 0.2s; }
.input-row:focus-within { border-color: var(--accent); }
.input-row input, .input-row select { flex: 1; border: none; background: transparent; font-size: 1rem; font-weight: 700; font-family: 'Zen Maru Gothic', sans-serif; color: var(--text); outline: none; width: 100%; -webkit-appearance: none; appearance: none; }
.input-row select { font-size: 0.88rem; }
.pref-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 12px; }
.pref-arrow { text-align: center; font-size: 1.2rem; color: var(--muted); }
.btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 1rem; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900; cursor: pointer; letter-spacing: 0.04em; transition: background 0.18s, transform 0.1s; box-shadow: 0 3px 10px rgba(232,87,42,0.25); margin-top: 14px; -webkit-tap-highlight-color: transparent; }
.btn:active { transform: scale(0.98); background: #c9451f; }
.tab-row { display: flex; gap: 6px; margin-bottom: 14px; }
.tab { flex: 1; text-align: center; padding: 7px 0; border-radius: 8px; font-size: 0.75rem; font-weight: 700; cursor: pointer; border: 1.5px solid var(--border); background: var(--bg); color: var(--muted); transition: all 0.15s; font-family: 'Zen Maru Gothic', sans-serif; -webkit-tap-highlight-color: transparent; }
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-section { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.filter-title { font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 10px; font-family: 'Zen Maru Gothic', sans-serif; }
.filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.filter-chip { display: flex; align-items: center; gap: 7px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 10px; cursor: pointer; transition: all 0.15s; user-select: none; -webkit-tap-highlight-color: transparent; }
.chip-box { width: 16px; height: 16px; border-radius: 4px; border: 2px solid var(--border); background: #fff; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.15s; color: transparent; }
.filter-chip.checked { border-color: var(--accent2); background: #f0f6ff; }
.filter-chip.checked .chip-box { background: var(--accent2); border-color: var(--accent2); color: #fff; }
.chip-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); font-family: 'Zen Maru Gothic', sans-serif; }
.filter-chip.checked .chip-label { color: var(--accent2); }
.filter-active-bar { display: none; margin-top: 8px; background: #eef4ff; border-radius: 8px; padding: 6px 10px; font-size: 0.72rem; color: var(--accent2); font-weight: 700; }
.filter-active-bar.show { display: block; }
.pref-note { font-size: 0.7rem; color: var(--muted); background: #f0f6ff; border-radius: 8px; padding: 6px 10px; margin-bottom: 12px; }
.pref-note.hidden { display: none; }
#results { display: none; }
.size-badge { display: inline-block; background: var(--accent); color: #fff; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900; font-size: 0.85rem; padding: 4px 12px; border-radius: 20px; margin-bottom: 6px; }
.route-badge { display: inline-block; background: var(--accent2); color: #fff; font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700; font-size: 0.75rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; margin-left: 6px; }
.result-list { display: flex; flex-direction: column; gap: 10px; }
.result-item { background: var(--bg); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border: 1.5px solid var(--border); position: relative; }
.result-item.best { border-color: var(--accent3); background: #f0fff5; box-shadow: 0 0 0 2px rgba(39,174,96,0.12); }
.result-item.unavailable { opacity: 0.38; }
.rank-badge { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900; font-size: 1.1rem; width: 28px; text-align: center; flex-shrink: 0; }
.result-item.best .rank-badge { color: var(--accent3); }
.rank-badge.gray { color: var(--muted); }
.service-info { flex: 1; min-width: 0; }
.service-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.service-note { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
.service-tags { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.stag { font-size: 0.62rem; font-weight: 700; padding: 2px 6px; border-radius: 6px; white-space: nowrap; }
.stag.anon { background: #fff0f8; color: #c03080; }
.stag.track { background: #f0f8ff; color: #2060c0; }
.stag.post { background: #f0fff0; color: #208040; }
.stag.comp { background: #fffff0; color: #808020; }
.price-col { text-align: right; flex-shrink: 0; }
.price { font-family: 'Zen Maru Gothic', sans-serif; font-weight: 900; font-size: 1.15rem; }
.result-item.best .price { color: var(--accent3); }
.price-sub { font-size: 0.7rem; color: var(--muted); }
.best-tag { position: absolute; top: -8px; right: 10px; background: var(--accent3); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.ng-tag { font-size: 0.7rem; font-weight: 700; color: #bbb; background: #eee; padding: 2px 8px; border-radius: 8px; }
.note-box { margin-top: 12px; background: #fff8f0; border-left: 3px solid var(--accent); padding: 10px 12px; border-radius: 0 8px 8px 0; font-size: 0.75rem; color: var(--muted); line-height: 1.6; }
.filtered-out-note { text-align: center; font-size: 0.72rem; color: var(--muted); padding: 8px 0; font-style: italic; }
</style>
</head>
<body>

<h1>📦 <span>送料</span>かんたん比較</h1>
<p class="subtitle">メルカリ発送 • 2025年最新料金</p>

<div class="card">
  <div class="section-title">荷物のサイズ・重さを入力</div>
  <div class="input-grid">
    <div class="input-group">
      <label>縦（cm）</label>
      <div class="input-row"><input type="number" id="len" placeholder="30" min="0" inputmode="decimal"></div>
    </div>
    <div class="input-group">
      <label>横（cm）</label>
      <div class="input-row"><input type="number" id="wid" placeholder="20" min="0" inputmode="decimal"></div>
    </div>
    <div class="input-group">
      <label>高さ・厚さ（cm）</label>
      <div class="input-row"><input type="number" id="hei" placeholder="5" min="0" inputmode="decimal"></div>
    </div>
    <div class="input-group">
      <label>重さ（g）</label>
      <div class="input-row"><input type="number" id="wgt" placeholder="300" min="0" inputmode="decimal"></div>
    </div>
  </div>

  <div class="tab-row">
    <div class="tab active" id="tab-mercari">メルカリ便</div>
    <div class="tab" id="tab-normal">通常発送</div>
    <div class="tab" id="tab-all">全部見る</div>
  </div>

  <div id="pref-section">
    <div class="pref-note" id="pref-note">📍 メルカリ便は全国一律料金なので発着地不要です</div>
    <div id="pref-inputs" style="display:none;">
      <div class="pref-row">
        <div class="input-group">
          <label>発送元（都道府県）</label>
          <div class="input-row"><select id="pref-from"><option value="">選択してください</option></select></div>
        </div>
        <div class="pref-arrow">→</div>
        <div class="input-group">
          <label>お届け先（都道府県）</label>
          <div class="input-row"><select id="pref-to"><option value="">選択してください</option></select></div>
        </div>
      </div>
    </div>
  </div>

  <div class="filter-section">
    <div class="filter-title">🔍 絞り込み（複数OK）</div>
    <div class="filter-grid">
      <div class="filter-chip" id="chip-anon"><div class="chip-box">✓</div><span class="chip-label">🙈 匿名配送のみ</span></div>
      <div class="filter-chip" id="chip-track"><div class="chip-box">✓</div><span class="chip-label">📍 追跡ありのみ</span></div>
      <div class="filter-chip" id="chip-post"><div class="chip-box">✓</div><span class="chip-label">📮 ポスト投函OK</span></div>
      <div class="filter-chip" id="chip-comp"><div class="chip-box">✓</div><span class="chip-label">🛡️ 補償ありのみ</span></div>
    </div>
    <div class="filter-active-bar" id="filter-bar"></div>
  </div>

  <button class="btn" id="calc-btn">▶ 比較する</button>
</div>

<div class="card" id="results">
  <div class="section-title">比較結果</div>
  <div id="size-info"></div>
  <div class="result-list" id="result-list"></div>
  <div class="note-box" id="note-box"></div>
</div>

function getZone(name) {
  for (var i = 0; i < PREFS.length; i++) {
    if (PREFS[i].name === name) return PREFS[i].zone;
  }
  return null;
}

function getYuZone(fz, tz) {
  var d = Math.abs(fz - tz);
  if (d === 0) return 'A';
  if (d === 1) return 'B';
  if (d === 2) return 'C';
  return 'D';
}

window.onload = function() {

function setMode(m) {
  mode = m;
  document.getElementById('tab-mercari').className = 'tab' + (m === 'mercari' ? ' active' : '');
  document.getElementById('tab-normal').className = 'tab' + (m === 'normal' ? ' active' : '');
  document.getElementById('tab-all').className = 'tab' + (m === 'all' ? ' active' : '');
  var note = document.getElementById('pref-note');
  var inputs = document.getElementById('pref-inputs');
  if (m === 'mercari') {
    note.textContent = 'メルカリ便は全国一律料金なので発着地不要です';
    note.className = 'pref-note';
    inputs.style.display = 'none';
  } else {
    note.className = 'pref-note hidden';
    inputs.style.display = 'block';
  }
}

function toggleFilter(key, el) {
  if (activeFilters[key]) {
    delete activeFilters[key];
    el.className = 'filter-chip';
  } else {
    activeFilters[key] = true;
    el.className = 'filter-chip checked';
  }
  var bar = document.getElementById('filter-bar');
  var labels = {anon:'匿名配送', track:'追跡あり', post:'ポスト投函', comp:'補償あり'};
  var keys = Object.keys(activeFilters);
  if (keys.length > 0) {
    var parts = [];
    for (var i = 0; i < keys.length; i++) parts.push(labels[keys[i]]);
    bar.textContent = '絞り込み中: ' + parts.join(' + ');
    bar.className = 'filter-active-bar show';
  } else {
    bar.className = 'filter-active-bar';
  }
}

function hasFlag(flags, key) {
  for (var i = 0; i < flags.length; i++) {
    if (flags[i] === key) return true;
  }
  return false;
}

function makeTags(flags) {
  var map = {anon:'匿名', track:'追跡', post:'ポスト', comp:'補償'};
  var html = '';
  for (var i = 0; i < flags.length; i++) {
    html += '<span class="stag ' + flags[i] + '">' + map[flags[i]] + '</span>';
  }
  return html;
}

      ok:function(l,w,h,kg){var s=l+w+h;return s<=80&&kg<=25&&!(s<=60);}},
    {name:'ゆうパック 100', provider:'ゆうゆうメルカリ便', price:1050, flags:['anon','track','comp'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=100&&kg<=25&&!(s<=80);}},
    {name:'ゆうパック 120', provider:'ゆうゆうメルカリ便', price:1200, flags:['anon','track','comp'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=120&&kg<=25&&!(s<=100);}},
    {name:'ゆうパック 140', provider:'ゆうゆうメルカリ便', price:1400, flags:['anon','track','comp'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=140&&kg<=25&&!(s<=120);}},
    {name:'ゆうパック 170', provider:'ゆうゆうメルカリ便', price:1900, flags:['anon','track','comp'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=170&&kg<=25&&!(s<=140);}}
  ];
}

  return [
    {name:'クリックポスト', provider:'日本郵便', price:185, flags:['track','post'],
      ok:function(l,w,h,kg){return l<=34&&w<=25&&h<=3&&kg<=1;}},
    {name:'レターパックライト', provider:'日本郵便', price:430, flags:['track','post'],
      ok:function(l,w,h,kg){return l<=34&&w<=24.8&&h<=3&&kg<=4;}},
    {name:'レターパックプラス', provider:'日本郵便', price:600, flags:['track'],
      ok:function(l,w,h,kg){return l<=34&&w<=24.8&&kg<=4;}},
    {name:'ゆうパケット', provider:'日本郵便（通常）', price:250, flags:['track','post'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=60&&Math.max(l,w,h)<=34&&h<=3&&kg<=1;}},
    {name:'宅急便 60サイズ', provider:'ヤマト（持込）', price:(fz&&tz?YAMATO[60][fz-1][tz]:935), flags:['track','comp'],
      ok:function(l,w,h,kg){return(l+w+h)<=60&&kg<=2;}},
    {name:'宅急便 80サイズ', provider:'ヤマト（持込）', price:(fz&&tz?YAMATO[80][fz-1][tz]:1221), flags:['track','comp'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=80&&kg<=5&&!(s<=60&&kg<=2);}},
    {name:'宅急便 100サイズ', provider:'ヤマト（持込）', price:(fz&&tz?YAMATO[100][fz-1][tz]:1529), flags:['track','comp'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=100&&kg<=10&&!(s<=80&&kg<=5);}},
    {name:'ゆうパック 60サイズ', provider:'日本郵便（持込）', price:YUPACK[60][yu], flags:['track','comp'],
      ok:function(l,w,h,kg){return(l+w+h)<=60&&kg<=25;}},
    {name:'ゆうパック 80サイズ', provider:'日本郵便（持込）', price:YUPACK[80][yu], flags:['track','comp'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=80&&kg<=25&&!(s<=60);}},
    {name:'ゆうパック 100サイズ', provider:'日本郵便（持込）', price:YUPACK[100][yu], flags:['track','comp'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=100&&kg<=25&&!(s<=80);}},
    {name:'佐川急便 60サイズ', provider:'佐川（持込）', price:(fz&&tz?SAGAWA[60][fz-1][tz]:880), flags:['track','comp'],
      ok:function(l,w,h,kg){return(l+w+h)<=60&&kg<=2;}},
    {name:'佐川急便 80サイズ', provider:'佐川（持込）', price:(fz&&tz?SAGAWA[80][fz-1][tz]:1140), flags:['track','comp'],
      ok:function(l,w,h,kg){var s=l+w+h;return s<=80&&kg<=5&&!(s<=60&&kg<=2);}}
  ];
}

function calc() {
  var l = parseFloat(document.getElementById('len').value) || 0;
  var w = parseFloat(document.getElementById('wid').value) || 0;
  var h = parseFloat(document.getElementById('hei').value) || 0;
  var g = parseFloat(document.getElementById('wgt').value) || 0;
  var kg = g / 1000;
  if (!l && !w && !h && !g) { alert('サイズまたは重さを入力してください'); return; }

  var fromPref = document.getElementById('pref-from').value;
  var toPref = document.getElementById('pref-to').value;
  var fz = getZone(fromPref);
  var tz = getZone(toPref);
  if (mode !== 'mercari' && (!fromPref || !toPref)) { alert('発送元と届け先の都道府県を選択してください'); return; }

  var tri = l + w + h;
  document.getElementById('results').style.display = 'block';

  var routeHtml = '';
  if (mode !== 'mercari' && fromPref && toPref) {
    routeHtml = '<span class="route-badge">' + fromPref + ' → ' + toPref + '</span>';
  }
  document.getElementById('size-info').innerHTML =
    '<span class="size-badge">3辺合計 ' + tri.toFixed(1) + 'cm / ' + g + 'g</span>' + routeHtml;

  var pool;
  if (mode === 'mercari') pool = getMercariServices();
  else if (mode === 'normal') pool = getNormalServices(fz, tz);
  else {
    pool = getMercariServices();
    var norm = getNormalServices(fz, tz);
    for (var i = 0; i < norm.length; i++) pool.push(norm[i]);
  }

  var seen = {};
  var uniq = [];
  for (var i = 0; i < pool.length; i++) {
    if (!seen[pool[i].name]) { seen[pool[i].name] = true; uniq.push(pool[i]); }
  }
  pool = uniq;

  var available = [], unavailable = [];
  for (var i = 0; i < pool.length; i++) {
    if (pool[i].ok(l, w, h, kg)) available.push(pool[i]);
    else unavailable.push(pool[i]);
  }

  var filterKeys = Object.keys(activeFilters);
  var filtered = [];
  for (var i = 0; i < available.length; i++) {
    var pass = true;
    for (var j = 0; j < filterKeys.length; j++) {
      if (!hasFlag(available[i].flags, filterKeys[j])) { pass = false; break; }
    }
    if (pass) filtered.push(available[i]);
  }
  var filteredOut = available.length - filtered.length;
  filtered.sort(function(a, b) { return a.price - b.price; });

  var list = document.getElementById('result-list');
  list.innerHTML = '';

  if (filtered.length === 0) {
    var msg = filterKeys.length > 0
      ? '絞り込み条件に合うサービスが見つかりませんでした<br><small>条件を外してみてね</small>'
      : 'このサイズに対応するサービスが見つかりませんでした';
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:16px;font-size:0.85rem;">' + msg + '</div>';
  } else {
    for (var i = 0; i < filtered.length; i++) {
      var s = filtered[i];
      var div = document.createElement('div');
      div.className = 'result-item' + (i === 0 ? ' best' : '');
      var bestTag = i === 0 ? '<span class="best-tag">最安</span>' : '';
      var rankCls = i === 0 ? '' : ' gray';
      var rankIcon = i === 0 ? '★' : (i + 1);
      var extraHtml = s.extra ? '<div class="price-sub">' + s.extra + '</div>' : '';
      div.innerHTML = bestTag +
        '<div class="rank-badge' + rankCls + '">' + rankIcon + '</div>' +
        '<div class="service-info">' +
          '<div class="service-name">' + s.name + '</div>' +
          '<div class="service-note">' + s.provider + '</div>' +
          '<div class="service-tags">' + makeTags(s.flags) + '</div>' +
        '</div>' +
        '<div class="price-col">' +
          '<div class="price">' + s.price.toLocaleString() + '円</div>' +
          extraHtml +
        '</div>';
      list.appendChild(div);
    }
    if (filteredOut > 0) {
      var n = document.createElement('div');
      n.className = 'filtered-out-note';
      n.textContent = '他に' + filteredOut + '件が絞り込みで非表示';
      list.appendChild(n);
    }
    var lim = Math.min(unavailable.length, 3);
    for (var i = 0; i < lim; i++) {
      var s = unavailable[i];
      var div = document.createElement('div');
      div.className = 'result-item unavailable';
      div.innerHTML = '<div class="rank-badge gray">—</div>' +
        '<div class="service-info"><div class="service-name">' + s.name + '</div><div class="service-note">' + s.provider + '</div></div>' +
        '<div class="price-col"><span class="ng-tag">サイズNG</span></div>';
      list.appendChild(div);
    }
  }

  var notes = [];
  if (mode === 'mercari' || mode === 'all') {
    notes.push('メルカリ便は全国一律・匿名配送・補償つき（最大3,000円）。');
    if (tri <= 60 && h <= 3 && kg <= 1) notes.push('薄い荷物はネコポス／ゆうパケット（210〜230円）がお得！');
  }
  if (mode === 'normal' || mode === 'all') {
    notes.push('通常発送の料金は持込割適用後の目安です。');
    notes.push('クリックポスト185円が最安ですがメルカリでは使えません。');
    if (fromPref && toPref) notes.push(fromPref + '→' + toPref + 'の地帯別料金で計算しています。');
  }
  notes.push('料金は2025年最新ですが変更の可能性があります。最終確認は各社公式サイトで。');
  document.getElementById('note-box').innerHTML = notes.join('<br>');

  document.getElementById('results').scrollIntoView({behavior:'smooth', block:'start'});
}
</script>
